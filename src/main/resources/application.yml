spring:
  application:
    name: code-audit-system-java21
  jackson:
    property-naming-strategy: SNAKE_CASE
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

server:
  port: 8000

audit:
  workspace: ${AUDIT_WORKSPACE:workspace}
  agentscope:
    provider: ${AGENTSCOPE_PROVIDER:anthropic}
    model: ${AGENTSCOPE_MODEL:claude-sonnet-4-5-20250929}
    api-key: ${AGENTSCOPE_API_KEY:${ANTHROPIC_API_KEY:}}
    base-url: ${AGENTSCOPE_BASE_URL:}
    max-iters: ${AGENTSCOPE_MAX_ITERS:80}
    timeout: ${AGENTSCOPE_TIMEOUT:30m}
  max-concurrent-jobs: ${MAX_CONCURRENT_JOBS:2}
  # Limits concurrent evidence preparation tasks; AgentScope uses one Supervisor session.
  max-concurrent-hunters: ${MAX_CONCURRENT_HUNTERS:15}
  hunter-timeout: ${HUNTER_TIMEOUT:30m}
  orchestrator:
    enabled: ${INTELLIGENT_ORCHESTRATOR_ENABLED:true}
    max-primary-hunters: ${MAX_PRIMARY_HUNTERS:10}
    max-additional-hunters: ${MAX_ADDITIONAL_HUNTERS:5}
    max-chunks-per-batch: ${MAX_CHUNKS_PER_BATCH:80}
