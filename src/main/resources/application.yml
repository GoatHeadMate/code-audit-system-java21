spring:
  application:
    name: code-audit-system-java21
  jackson:
    property-naming-strategy: SNAKE_CASE
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

server:
  port: 7777

audit:
  workspace: ${AUDIT_WORKSPACE:workspace}
  agentscope:
    provider: anthropic
    model: glm-5.2
    api-key: sk_
    base-url: https://open.bigmodel.cn/api/anthropic
    max-iters: ${AGENTSCOPE_MAX_ITERS:80}
  max-concurrent-jobs: ${MAX_CONCURRENT_JOBS:2}
  # Limits concurrent evidence preparation tasks; AgentScope uses one Supervisor session.
  max-concurrent-hunters: ${MAX_CONCURRENT_HUNTERS:15}
  orchestrator:
    enabled: ${INTELLIGENT_ORCHESTRATOR_ENABLED:true}
    max-primary-hunters: ${MAX_PRIMARY_HUNTERS:10}
    max-additional-hunters: ${MAX_ADDITIONAL_HUNTERS:5}
    max-chunks-per-batch: ${MAX_CHUNKS_PER_BATCH:80}
    max-parallel-hunter-sessions: ${MAX_PARALLEL_HUNTER_SESSIONS:2}
  codegraph:
    enabled: ${CODEGRAPH_MCP_ENABLED:true}
    command: C:\Users\23690\AppData\Roaming\npm\codegraph.cmd
    auto-index: ${CODEGRAPH_AUTO_INDEX:true}
    tools: ${CODEGRAPH_MCP_TOOLS:codegraph_explore}
    node-home: D:\huawei\tools\node-v22.23.1-win-x64
