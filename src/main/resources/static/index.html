<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Audit System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif; }

  /* Thin scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Animations */
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  .pulse { animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .8s linear infinite; }

  /* Log text */
  .log-line {
    font-family: 'Consolas','Monaco','Menlo','Courier New',monospace;
    font-size: 12.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-subagent-start {
    margin: 4px 0;
    padding: 5px 10px;
    border-left: 3px solid #6366f1;
    background: #eef2ff;
    color: #3730a3;
    border-radius: 0 6px 6px 0;
  }
  .log-subagent-return {
    margin: 7px 0;
    padding: 8px 10px;
    border: 1px solid #a7f3d0;
    border-left: 4px solid #10b981;
    border-radius: 6px;
    background: #ecfdf5;
    color: #065f46;
    font-size: 13px;
    font-weight: 600;
  }
  .log-subagent-return.failed {
    border-color: #fecaca;
    border-left-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }
  .log-supervisor {
    margin: 5px 0;
    padding: 7px 10px;
    border: 1px solid #c7d2fe;
    border-left: 4px solid #6366f1;
    border-radius: 6px;
    background: #eef2ff;
    color: #312e81;
  }
  .log-supervisor.completed {
    border-color: #a7f3d0;
    border-left-color: #10b981;
    background: #ecfdf5;
    color: #065f46;
  }

  /* Job list rows */
  .job-row {
    cursor: pointer;
    transition: all .15s;
    border-left: 3px solid transparent;
    border-bottom: 1px solid #f1f5f9;
  }
  .job-row:hover { background: #f8fafc; }
  .job-row.sel {
    background: #eff6ff;
    border-left-color: #3b82f6;
  }

  /* Tab button */
  .tab {
    padding: .5rem 1rem;
    font-size: .8125rem;
    color: #64748b;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
    font-weight: 500;
  }
  .tab:hover { color: #1e293b; }
  .tab.on { color: #2563eb; border-bottom-color: #3b82f6; }

  /* Toggle button */
  .tog {
    flex: 1;
    padding: .375rem .5rem;
    border-radius: .375rem;
    font-size: .75rem;
    font-weight: 500;
    transition: all .15s;
    text-align: center;
  }
  .tog.on  { background: #2563eb; color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
  .tog.off { color: #64748b; }
  .tog.off:hover { color: #1e293b; background: #f1f5f9; }

  /* Severity colors for light theme */
  .sev-critical { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  .sev-high     { background: #fff7ed; color: #ea580c; border-color: #fed7aa; }
  .sev-medium   { background: #fefce8; color: #ca8a04; border-color: #fef08a; }
  .sev-low      { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }

  @media (max-width: 768px) {
    body { min-height: 100dvh; overflow: auto; }
    .app-shell { flex-direction: column; overflow: visible; }
    .sidebar {
      width: 100%;
      max-height: 20rem;
      border-right: 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .main-panel { min-height: 42rem; overflow: visible; }
    #detailView { min-height: 42rem; }
    #panelFindings, #panelSummary { padding: 1rem; }
    .finding-card { padding: 1rem; }
    .finding-header { flex-direction: column; align-items: stretch; }
    .finding-meta { max-width: none; text-align: left; }
  }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden text-slate-800 bg-slate-50">

<!-- ═══════ HEADER ═══════════════════════════════════════════════════ -->
<header class="shrink-0 flex items-center justify-between px-5 py-3 bg-white border-b border-slate-200 shadow-sm z-10">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm">
      <svg class="w-4.5 h-4.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
    </div>
    <div>
      <span class="font-semibold text-slate-800">Code Audit System</span>
      <span class="hidden sm:inline text-xs text-slate-400 ml-1.5">Java 白盒分析 + AgentScope</span>
    </div>
  </div>
  <div id="health" class="flex items-center gap-1.5 text-xs text-slate-400">
    <span class="w-2 h-2 rounded-full bg-slate-300"></span><span>连接中…</span>
  </div>
</header>

<!-- ═══════ BODY ═══════════════════════════════════════════════════ -->
<div class="app-shell flex flex-1 overflow-hidden">

  <!-- ─── SIDEBAR ────────────────────────────────────────────────── -->
  <aside class="sidebar w-64 shrink-0 flex flex-col overflow-hidden bg-white border-r border-slate-200">

    <!-- Submit -->
    <div class="shrink-0 p-4 border-b border-slate-100">
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">新建审计</p>

      <!-- Source toggle -->
      <div class="flex bg-slate-100 rounded-lg p-0.5 mb-3 gap-0.5">
        <button id="tGit" class="tog on" onclick="setMode('git')">Git URL</button>
        <button id="tZip" class="tog off" onclick="setMode('zip')">ZIP 上传</button>
      </div>

      <div id="fGit">
        <input id="gitUrl" type="url" placeholder="https://github.com/…" oninput="discardInterfacePreview()"
          class="w-full bg-slate-50 border border-slate-200 text-sm text-slate-700
                 placeholder-slate-400 rounded-lg px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all" />
      </div>

      <div id="fZip" class="hidden">
        <label class="flex flex-col items-center justify-center w-full h-14 border-2 border-dashed
                      border-slate-200 rounded-lg cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all">
          <span id="zipName" class="text-xs text-slate-400">📁 点击选择 ZIP 文件</span>
          <input id="zipFile" type="file" accept=".zip" class="hidden" onchange="onZip(this)">
        </label>
      </div>

      <button id="submitBtn" onclick="doSubmit()"
        class="mt-3 w-full flex items-center justify-center gap-2 py-2.5 bg-blue-600 hover:bg-blue-700
               text-white text-sm font-medium rounded-lg transition-colors shadow-sm
               hover:shadow disabled:opacity-50">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11 4a7 7 0 105.293 11.586L20 19.293M11 8v6m-3-3h6"/>
        </svg>
        扫描并选择接口
      </button>
      <div id="submitErr" class="hidden mt-1.5 text-xs text-red-500 text-center"></div>
    </div>

    <!-- Job list -->
    <div class="shrink-0 flex items-center justify-between px-4 py-2.5">
      <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">任务列表</span>
      <button onclick="loadJobs()" title="刷新"
        class="text-slate-400 hover:text-blue-500 transition-colors p-1 rounded hover:bg-slate-100">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>

    <div id="jobList" class="flex-1 overflow-y-auto">
      <div class="py-10 text-center text-xs text-slate-400">暂无任务</div>
    </div>
  </aside>

  <!-- ─── MAIN ──────────────────────────────────────────────────── -->
  <main class="main-panel flex-1 flex flex-col overflow-hidden bg-slate-50">

    <!-- Empty state -->
    <div id="emptyMain"
      class="flex-1 flex flex-col items-center justify-center gap-3 text-slate-400 select-none">
      <svg class="w-16 h-16 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      <p class="text-sm">选择左侧任务查看详情</p>
    </div>

    <!-- Detail view -->
    <div id="detailView" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- Detail header -->
      <div class="shrink-0 flex items-center gap-3 px-5 py-3 bg-white border-b border-slate-200">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <code id="dId" class="text-sm font-mono text-blue-600 font-semibold"></code>
            <span id="dBadge"></span>
          </div>
          <div id="dSrc" class="text-xs text-slate-400 truncate"></div>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <span id="dCount" class="hidden text-xs px-2.5 py-1 rounded-full font-medium
                                    bg-orange-50 text-orange-600 border border-orange-200"></span>
          <span id="dTime" class="text-xs text-slate-400"></span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="shrink-0 flex border-b border-slate-200 bg-white px-4 gap-1">
        <button id="tabLogs"     class="tab on"  onclick="showTab('Logs')">实时日志</button>
        <button id="tabFindings" class="tab"     onclick="showTab('Findings')">漏洞发现</button>
        <button id="tabSummary"  class="tab"     onclick="showTab('Summary')">摘要</button>
        <button id="tabRules"    class="tab"     onclick="showTab('Rules')">审计规则</button>
      </div>

      <!-- Log panel -->
      <div id="panelLogs"
        class="flex-1 overflow-y-auto p-4 space-y-px bg-white border-t border-slate-100"
        style="background:#fafbfd"
        onscroll="onScroll(this)">
        <div id="logEnd"></div>
      </div>

      <!-- Findings panel -->
      <div id="panelFindings" class="hidden flex-1 overflow-y-auto p-5">
        <div id="findingsBody" class="text-sm text-slate-400 text-center py-12">等待审计完成…</div>
      </div>

      <!-- Summary panel -->
      <div id="panelSummary" class="hidden flex-1 overflow-y-auto p-5">
        <div id="summaryBody" class="text-sm text-slate-400 text-center py-12">等待审计完成…</div>
      </div>

      <!-- Rule candidates panel (human gate) -->
      <div id="panelRules" class="hidden flex-1 overflow-y-auto p-5">
        <div id="rulesBody" class="text-sm text-slate-400 text-center py-12">加载审计规则候选…</div>
      </div>
    </div>
  </main>
</div>

<div id="interfaceModal"
  class="hidden fixed inset-0 z-50 bg-slate-950/45 backdrop-blur-sm p-4 sm:p-8"
  role="dialog" aria-modal="true" aria-labelledby="interfaceModalTitle">
  <div class="mx-auto flex h-full max-h-[760px] max-w-4xl flex-col overflow-hidden rounded-2xl
              border border-slate-200 bg-white shadow-2xl">
    <div class="flex items-start justify-between gap-4 border-b border-slate-200 px-5 py-4">
      <div>
        <div class="mb-1 flex items-center gap-2">
          <span class="rounded-md bg-blue-50 px-2 py-1 text-[11px] font-semibold uppercase tracking-wider text-blue-600">
            Scope
          </span>
          <span id="interfaceCount" class="text-xs font-medium text-slate-500"></span>
        </div>
        <h2 id="interfaceModalTitle" class="text-lg font-semibold text-slate-900">选择检测接口</h2>
        <p class="mt-1 text-sm text-slate-500">仅为勾选入口构建调用路径，存储型异步链仍会继续追踪。</p>
      </div>
      <button onclick="closeInterfaceModal()" aria-label="关闭接口选择"
        class="rounded-lg p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>

    <div class="flex flex-wrap items-center gap-2 border-b border-slate-100 bg-slate-50/80 px-5 py-3">
      <div class="relative min-w-[220px] flex-1">
        <svg class="pointer-events-none absolute left-3 top-2.5 h-4 w-4 text-slate-400"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M16.5 16.5L21 21"/>
        </svg>
        <input id="interfaceSearch" type="search" placeholder="搜索路径、方法、类或文件"
          oninput="renderInterfaces()"
          class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm text-slate-700
                 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-500/15">
      </div>
      <button onclick="selectVisibleInterfaces()"
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600
               transition hover:border-blue-300 hover:text-blue-600">全选当前结果</button>
      <button onclick="clearInterfaceSelection()"
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600
               transition hover:border-red-200 hover:text-red-500">清空选择</button>
    </div>

    <div id="interfaceList" class="flex-1 overflow-y-auto bg-slate-50 p-3 sm:p-4"></div>

    <div class="flex flex-col gap-3 border-t border-slate-200 bg-white px-5 py-4 sm:flex-row sm:items-center">
      <div class="flex-1 text-sm text-slate-500">
        已选择 <strong id="selectedInterfaceCount" class="font-semibold text-blue-600">0</strong> 个接口
      </div>
      <div id="interfaceStartErr" class="hidden text-xs text-red-500"></div>
      <button onclick="closeInterfaceModal()"
        class="rounded-lg border border-slate-200 px-4 py-2.5 text-sm font-medium text-slate-600
               transition hover:bg-slate-50">取消</button>
      <button id="startSelectedBtn" onclick="startSelectedAudit()"
        class="flex items-center justify-center gap-2 rounded-lg bg-blue-600 px-5 py-2.5 text-sm
               font-semibold text-white shadow-sm transition hover:bg-blue-700 disabled:cursor-not-allowed
               disabled:opacity-45">
        开始所选接口审计
      </button>
    </div>
  </div>
</div>

<!-- ═══════ SCRIPT ═══════════════════════════════════════════════════ -->
<script>
// ── State ──────────────────────────────────────────────────────────
let selId    = null;
let srcMode  = 'git';
let es       = null;
let autoScrl = true;
let jobs     = {};
let previewJobId = null;
let interfaces = [];
let selectedInterfaces = new Set();

// ── Boot ───────────────────────────────────────────────────────────
ping();
loadJobs();
setInterval(ping, 10000);
setInterval(loadJobs, 3000);

// ── Health ─────────────────────────────────────────────────────────
async function ping() {
  const el = document.getElementById('health');
  try {
    const ok = (await fetch('/health')).ok;
    el.innerHTML = ok
      ? `<span class="w-2 h-2 rounded-full bg-emerald-400 pulse"></span><span class="text-emerald-600 font-medium">在线</span>`
      : `<span class="w-2 h-2 rounded-full bg-red-400"></span><span class="text-red-500">错误</span>`;
  } catch {
    el.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400"></span><span class="text-red-500">离线</span>`;
  }
}

// ── Source mode toggle ─────────────────────────────────────────────
function setMode(m) {
  if (srcMode !== m) discardInterfacePreview();
  srcMode = m;
  document.getElementById('tGit').className  = 'tog ' + (m==='git' ? 'on' : 'off');
  document.getElementById('tZip').className  = 'tog ' + (m==='zip' ? 'on' : 'off');
  document.getElementById('fGit').classList.toggle('hidden', m !== 'git');
  document.getElementById('fZip').classList.toggle('hidden', m !== 'zip');
}
function onZip(inp) {
  document.getElementById('zipName').textContent =
    inp.files[0] ? `📁 ${inp.files[0].name}` : '📁 点击选择 ZIP 文件';
  discardInterfacePreview();
}

// ── Submit ─────────────────────────────────────────────────────────
async function doSubmit() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('submitErr');
  err.classList.add('hidden');
  if (previewJobId && interfaces.length) {
    openInterfaceModal();
    renderInterfaces();
    return;
  }

  const fd = new FormData();
  fd.append('lang', 'java');

  if (srcMode === 'git') {
    const u = document.getElementById('gitUrl').value.trim();
    if (!u) return showErr('请输入 Git URL');
    fd.append('git_url', u);
  } else {
    const f = document.getElementById('zipFile').files[0];
    if (!f) return showErr('请选择 ZIP 文件');
    fd.append('file', f);
  }

  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 spin" fill="none" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
    <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg> 正在扫描接口…`;

  try {
    const r = await fetch('/audit/interfaces', { method:'POST', body:fd });
    const res = await readJsonResponse(r);
    if (!r.ok) throw new Error(res.detail || `提交失败（HTTP ${r.status}）`);

    previewJobId = res.job_id;
    interfaces = res.interfaces || [];
    selectedInterfaces = new Set(interfaces.map(item => item.id));
    document.getElementById('interfaceSearch').value = '';
    document.getElementById('interfaceStartErr').classList.add('hidden');
    openInterfaceModal();
    renderInterfaces();
    await loadJobs();
  } catch(e) {
    showErr(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M11 4a7 7 0 105.293 11.586L20 19.293M11 8v6m-3-3h6"/>
    </svg> 扫描并选择接口`;
  }
}

async function readJsonResponse(response) {
  const raw = await response.text();
  try {
    return raw ? JSON.parse(raw) : {};
  } catch {
    const preview = raw.replace(/\s+/g, ' ').slice(0, 160);
    throw new Error(
      `服务器返回了非 JSON 响应（HTTP ${response.status}）。` +
      `请确认页面是通过 Java 服务地址打开，而不是直接打开 HTML 文件。` +
      (preview ? ` 响应：${preview}` : '')
    );
  }
}

function openInterfaceModal() {
  document.getElementById('interfaceModal').classList.remove('hidden');
  document.body.classList.add('overflow-hidden');
  setTimeout(() => document.getElementById('interfaceSearch').focus(), 50);
}

function closeInterfaceModal() {
  document.getElementById('interfaceModal').classList.add('hidden');
  document.body.classList.remove('overflow-hidden');
}

function resetInterfacePreview() {
  previewJobId = null;
  interfaces = [];
  selectedInterfaces = new Set();
}

function discardInterfacePreview() {
  const abandonedJobId = previewJobId;
  resetInterfacePreview();
  if (abandonedJobId) {
    fetch(`/audit/${abandonedJobId}/preview`, {method: 'DELETE'})
      .catch(() => {});
  }
}

function filteredInterfaces() {
  const query = document.getElementById('interfaceSearch').value
    .trim().toLowerCase();
  if (!query) return interfaces;
  return interfaces.filter(item => [
    item.route,
    (item.operations || []).join(' '),
    item.class_name,
    item.method_name,
    item.file_path,
    item.framework
  ].some(value => String(value || '').toLowerCase().includes(query)));
}

function renderInterfaces() {
  const list = document.getElementById('interfaceList');
  const filtered = filteredInterfaces();
  document.getElementById('interfaceCount').textContent =
    `${filtered.length} / ${interfaces.length} 个接口`;

  if (!interfaces.length) {
    list.innerHTML = `<div class="flex h-full flex-col items-center justify-center py-16 text-center">
      <div class="mb-3 rounded-full bg-slate-100 p-3 text-slate-400">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 9h8m-8 4h5m-8 7l-3-3V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2H9l-4 3z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-700">未发现可选择的 HTTP 或 WebSocket 接口</p>
      <p class="mt-1 text-xs text-slate-400">请检查源码是否包含受支持的入口注解。</p>
    </div>`;
    updateSelectionCount();
    return;
  }

  if (!filtered.length) {
    list.innerHTML = `<div class="py-16 text-center text-sm text-slate-400">没有匹配的接口</div>`;
    updateSelectionCount();
    return;
  }

  list.innerHTML = `<div class="space-y-2">${filtered.map(item => {
    const checked = selectedInterfaces.has(item.id);
    const methods = (item.operations || ['ANY']).map(method =>
      `<span class="rounded bg-slate-900 px-1.5 py-0.5 font-mono text-[10px] font-semibold text-white">${esc(method)}</span>`
    ).join('');
    const secured = (item.security_annotations || []).length > 0;
    return `<label class="group flex cursor-pointer gap-3 rounded-xl border p-3.5 transition
                         ${checked ? 'border-blue-300 bg-blue-50/70 shadow-sm' : 'border-slate-200 bg-white hover:border-slate-300'}">
      <input type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
        ${checked ? 'checked' : ''} onchange="toggleInterface('${item.id}', this.checked)">
      <div class="min-w-0 flex-1">
        <div class="flex flex-wrap items-center gap-2">
          ${methods}
          <code class="break-all text-sm font-semibold text-slate-800">${esc(item.route || '/')}</code>
          <span class="ml-auto rounded-full px-2 py-0.5 text-[10px] font-medium
            ${secured ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}">
            ${secured ? '方法级鉴权' : '未发现方法级鉴权'}
          </span>
        </div>
        <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500">
          <span>${esc(item.class_name)}.${esc(item.method_name)}</span>
          <span class="truncate font-mono text-[11px] text-slate-400">${esc(item.file_path)}:${item.start_line}</span>
          <span>${esc(item.framework || item.protocol)}</span>
        </div>
      </div>
    </label>`;
  }).join('')}</div>`;
  updateSelectionCount();
}

function toggleInterface(id, checked) {
  checked ? selectedInterfaces.add(id) : selectedInterfaces.delete(id);
  renderInterfaces();
}

function selectVisibleInterfaces() {
  filteredInterfaces().forEach(item => selectedInterfaces.add(item.id));
  renderInterfaces();
}

function clearInterfaceSelection() {
  selectedInterfaces.clear();
  renderInterfaces();
}

function updateSelectionCount() {
  document.getElementById('selectedInterfaceCount').textContent =
    selectedInterfaces.size;
  document.getElementById('startSelectedBtn').disabled =
    selectedInterfaces.size === 0 || !previewJobId;
}

async function startSelectedAudit() {
  const btn = document.getElementById('startSelectedBtn');
  const err = document.getElementById('interfaceStartErr');
  err.classList.add('hidden');
  if (!previewJobId || selectedInterfaces.size === 0) {
    err.textContent = '请至少选择一个接口';
    err.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<svg class="h-4 w-4 spin" fill="none" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
    <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg> 正在启动…`;
  try {
    const r = await fetch(`/audit/${previewJobId}/start`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({interface_ids: [...selectedInterfaces]})
    });
    const res = await readJsonResponse(r);
    if (!r.ok) throw new Error(res.detail || `启动失败（HTTP ${r.status}）`);

    const jobId = previewJobId;
    closeInterfaceModal();
    document.getElementById('gitUrl').value = '';
    document.getElementById('zipFile').value = '';
    document.getElementById('zipName').textContent = '📁 点击选择 ZIP 文件';
    resetInterfacePreview();
    await loadJobs();
    select(jobId);
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
  } finally {
    btn.innerHTML = '开始所选接口审计';
    updateSelectionCount();
  }
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape'
      && !document.getElementById('interfaceModal').classList.contains('hidden')) {
    closeInterfaceModal();
  }
});

function showErr(msg) {
  const el = document.getElementById('submitErr');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── Job list ───────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const { jobs: list } = await (await fetch('/audit')).json();
    jobs = {};
    list.forEach(j => jobs[j.job_id] = j);
    renderList(list);
    if (selId && jobs[selId]) {
      updateHeader(jobs[selId]);
      if (jobs[selId].status === 'done') loadFindings(selId);
    }
  } catch { /* retry next tick */ }
}

function renderList(list) {
  const el = document.getElementById('jobList');
  if (!list.length) {
    el.innerHTML = `<div class="py-10 text-center text-xs text-slate-400">暂无任务</div>`;
    return;
  }
  el.innerHTML = list.map(j => `
    <div class="job-row px-4 py-3 ${j.job_id===selId?'sel':''}" onclick="select('${j.job_id}')">
      <div class="flex items-center justify-between gap-1 mb-0.5">
        <code class="text-xs font-mono text-blue-600 font-medium">#${j.job_id}</code>
        ${mkBadge(j.status)}
      </div>
      <div class="text-xs text-slate-400 truncate">
        ${j.source_type==='git'
          ? `<span class="text-slate-300">git</span> ${esc(j.git_url||'')}`
          : '📦 zip'}
      </div>
      ${j.findings_count>0
        ? `<div class="text-xs text-orange-500 font-medium mt-0.5">${j.findings_count} findings</div>`
        : ''}
      <div class="text-xs text-slate-300 mt-0.5">${ago(j.created_at)}</div>
    </div>`).join('');
}

// ── Job selection ──────────────────────────────────────────────────
function select(id) {
  stopES();
  selId     = id;
  autoScrl  = true;

  document.getElementById('emptyMain').classList.add('hidden');
  const dv = document.getElementById('detailView');
  dv.classList.remove('hidden');
  dv.classList.add('flex');

  const lp = document.getElementById('panelLogs');
  const anchor = document.getElementById('logEnd');
  while (lp.firstChild !== anchor) lp.removeChild(lp.firstChild);

  document.getElementById('findingsBody').innerHTML =
    `<div class="text-sm text-slate-400 text-center py-12">等待审计完成…</div>`;
  document.getElementById('summaryBody').innerHTML  =
    `<div class="text-sm text-slate-400 text-center py-12">等待审计完成…</div>`;

  renderList(Object.values(jobs));
  showTab('Logs');

  const j = jobs[id];
  if (j) {
    updateHeader(j);
    if (j.status === 'done')   loadFindings(id);
    if (j.status === 'failed' && j.error) addLog(`[FATAL] ${j.error}`, 'err');
  }
  startES(id);
}

function updateHeader(j) {
  document.getElementById('dId').textContent    = `#${j.job_id}`;
  document.getElementById('dBadge').innerHTML   = mkBadge(j.status, true);
  document.getElementById('dSrc').textContent   =
    j.source_type==='git' ? `git · ${j.git_url||''}` : `zip · ${j.lang}`;
  document.getElementById('dTime').textContent  = ago(j.updated_at);
  const fc = document.getElementById('dCount');
  if (j.findings_count > 0) {
    fc.textContent = `${j.findings_count} findings`;
    fc.classList.remove('hidden');
  } else fc.classList.add('hidden');
}

// ── Log streaming ──────────────────────────────────────────────────
function startES(id) {
  const src = new EventSource(`/audit/${id}/logs`);
  es = src;
  src.onmessage = e => {
    if (e.data === '[DONE]') {
      src.close(); es = null;
      addLog('─── 日志结束 ───', 'dim');
      loadJobs();
      return;
    }
    addLog(e.data);
  };
  src.onerror = () => { if (src.readyState !== EventSource.CLOSED) { src.close(); es = null; } };
}
function stopES() { if (es) { es.close(); es = null; } }

function addLog(text, type = '') {
  const lp     = document.getElementById('panelLogs');
  const anchor = document.getElementById('logEnd');
  const d      = document.createElement('div');
  d.className  = 'log-line ' + logColor(text, type);
  d.innerHTML  = colorize(text, type);
  lp.insertBefore(d, anchor);
  if (autoScrl) lp.scrollTop = lp.scrollHeight;
}

function logColor(t, type) {
  if (type==='err') return 'text-red-600';
  if (type==='dim') return 'text-slate-300 text-center text-xs py-1';
  if (t.includes('[subagent-return]'))
    return 'log-subagent-return' + (t.includes(' FAILED ') ? ' failed' : '');
  if (t.includes('[subagent-start]')) return 'log-subagent-start';
  if (t.includes('subagent(s) returned results')) return 'log-subagent-return';
  if (t.includes('[supervisor]')) {
    const completed = /\bcompleted\b|all\s+\d+\s+hunters?\s+completed/i.test(t);
    return 'log-supervisor' + (completed ? ' completed' : '');
  }
  return 'text-slate-600';
}
function colorize(t, type) {
  if (type==='err'||type==='dim') return esc(t);
  const returned = t.match(
    /\[subagent-return\]\s+(DONE|FAILED)\s+([^|]+?)\s+\|\s+progress\s+([^|]+?)\s+\|\s+result\s+(.+)$/
  );
  if (returned) {
    const statusClass = returned[1] === 'FAILED' ? 'text-red-600' : 'text-emerald-600';
    const statusText  = returned[1] === 'FAILED' ? 'HUNTER FAILED' : 'HUNTER COMPLETED';
    return `<span class="${statusClass} font-bold">${statusText}</span>`
      + `<span class="text-slate-800 ml-2 font-medium">${esc(returned[2].trim())}</span>`
      + `<span class="text-slate-400 ml-3">进度 ${esc(returned[3].trim())}</span>`
      + `<span class="text-slate-400 ml-3">返回 ${esc(returned[4].trim())}</span>`;
  }
  const started = t.match(/\[subagent-start\]\s+START\s+([^:]+)(?::\s*(.*))?$/);
  if (started) {
    return `<span class="text-indigo-600 font-bold">HUNTER STARTED</span>`
      + `<span class="text-slate-800 ml-2 font-medium">${esc(started[1].trim())}</span>`
      + (started[2] ? `<span class="text-slate-400 ml-3">${esc(started[2])}</span>` : '');
  }
  if (t.includes('subagent(s) returned results'))
    return `<span class="text-emerald-600 font-bold">HUNTER COMPLETED</span>`
      + `<span class="text-slate-600 ml-2">${esc(t)}</span>`;
  if (t.includes('[supervisor]')) {
    const idx = t.indexOf('[supervisor]');
    const ts = t.substring(0, idx);
    const body = t.slice(idx + '[supervisor]'.length).trim();
    const completed = /\bcompleted\b|all\s+\d+\s+hunters?\s+completed/i.test(body);
    const label = completed ? 'SUPERVISOR · COMPLETED' : 'SUPERVISOR';
    const labelClass = completed ? 'text-emerald-600' : 'text-indigo-600';
    return `<span class="text-slate-400">${esc(ts)}</span><span class="${labelClass} font-semibold">${label}</span>`
      + `<span class="text-slate-700 ml-2">${esc(body)}</span>`;
  }
  if (t.includes('[orchestrator]')) {
    const idx = t.indexOf('[orchestrator]');
    const ts = t.substring(0, idx);
    const body = t.slice(idx + '[orchestrator]'.length);
    return `<span class="text-slate-400">${esc(ts)}</span><span class="text-purple-600 font-medium">[orchestrator]</span><span class="text-slate-600">${esc(body)}</span>`;
  }
  const m = t.match(/^(\[\d{2}:\d{2}:\d{2}\]\s*)?(\[[^\]]+\])([\s\S]*)/);
  if (m) return `<span class="text-slate-400">${esc(m[1]||'')}</span><span class="text-emerald-600 font-medium">${esc(m[2])}</span><span class="text-slate-600">${esc(m[3])}</span>`;
  if (/FATAL|ERROR/.test(t)) return `<span class="text-red-600">${esc(t)}</span>`;
  if (/WARN/.test(t))        return `<span class="text-amber-600">${esc(t)}</span>`;
  if (t.includes('done:'))   return `<span class="text-emerald-600">${esc(t)}</span>`;
  return esc(t);
}
function onScroll(el) {
  autoScrl = el.scrollTop + el.clientHeight >= el.scrollHeight - 80;
}

// ── Findings ───────────────────────────────────────────────────────
async function sendFeedback(idx, verdict, btn) {
  if (!selId) return;
  const wrap = btn.closest('.feedback-actions');
  try {
    const r = await fetch(`/audit/${selId}/findings/${idx}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verdict, reviewer: 'ui' })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const label = { CONFIRM:'已确认漏洞', FALSE_POSITIVE:'已标记误报', NEEDS_REVIEW:'已标记待复核' }[verdict] || verdict;
    if (wrap) wrap.innerHTML = `<span class="text-xs text-emerald-600 font-medium">${label}（已记入审计记忆）</span>`;
  } catch (e) {
    if (wrap) wrap.insertAdjacentHTML('beforeend', `<span class="text-xs text-red-500 ml-1">提交失败，请重试</span>`);
  }
}

async function loadFindings(id) {
  try {
    const r = await fetch(`/audit/${id}/findings`);
    if (!r.ok) return;
    const data = await r.json();
    renderFindings(data);
    renderSummary(data);
  } catch { /* ignore */ }
}

function renderFindings({ findings=[] }) {
  const el = document.getElementById('findingsBody');
  if (!findings.length) {
    el.innerHTML = `<div class="py-16 text-center">
      <div class="text-4xl mb-3">🎉</div>
      <div class="text-sm text-slate-400">未发现漏洞</div>
    </div>`;
    return;
  }
  el.innerHTML = `
    <div class="mb-4 text-sm text-slate-500">
      共 <strong class="text-slate-800">${findings.length}</strong> 个漏洞
    </div>
    <div class="space-y-3">${findings.map((f, i) => mkFinding(f, i)).join('')}</div>`;
}

function mkFinding(f, idx) {
  const sev   = (f.severity||'UNKNOWN').toUpperCase();
  const conf  = (f.confidence||'').toString().toUpperCase();
  const fname = (f.file_path||'').replace(/\\/g,'/').split('/').pop();
  const flow  = f.data_flow_path||[];
  const evidence = f.evidence||'';
  const isChain  = (f.vuln_type||'').includes('CHAIN');
  const vtype    = f.vuln_type||f.vulnerability_type||'';

  const confLabel = {'HIGH':'高','MEDIUM':'中','LOW':'低'}[conf]||conf;
  const sevBorder = {CRITICAL:'border-l-red-500',HIGH:'border-l-orange-400',MEDIUM:'border-l-amber-400',LOW:'border-l-blue-400'}[sev]||'border-l-slate-300';

  return `
    <div class="finding-card bg-white border border-slate-200 ${sevBorder} border-l-4 rounded-xl p-5 hover:shadow-lg hover:border-slate-300 transition-all">
      <!-- Header -->
      <div class="finding-header flex items-start justify-between gap-2 mb-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap mb-1.5">
            ${mkSev(sev)}
            <code class="text-xs text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded font-medium whitespace-nowrap">${esc(f.rule_id||'')}</code>
            ${isChain?'<span class="text-xs px-2 py-0.5 rounded-full bg-purple-50 text-purple-600 border border-purple-200 font-medium whitespace-nowrap">攻击链</span>':''}
            <span class="text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 whitespace-nowrap">${esc(vtype.replace(/_/g,' '))}</span>
          </div>
          <h3 class="text-sm font-semibold text-slate-800 leading-snug">${esc(f.title||'')}</h3>
        </div>
        <div class="finding-meta shrink-0 text-right max-w-[40%]">
          <div class="text-xs text-slate-400">置信度: <span class="font-medium text-slate-600">${esc(confLabel)}</span></div>
          ${f.reachability?`<div class="text-xs text-slate-400 mt-0.5 break-words">${esc(f.reachability)}</div>`:''}
        </div>
      </div>

      <!-- Description -->
      <p class="text-sm text-slate-600 leading-relaxed mb-4">${esc(f.message||'')}</p>

      <!-- Entry point info -->
      ${f.http_method||f.http_path||f.entrypoint?`
      <div class="flex flex-wrap items-center gap-2 mb-4 text-xs">
        ${f.http_method&&f.http_path?`
          <span class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-emerald-50 text-emerald-700 border border-emerald-200 font-mono font-medium">
            <span class="font-bold">${esc(f.http_method)}</span> ${esc(f.http_path)}
          </span>`:''}
        ${f.entrypoint?`
          <span class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-slate-50 text-slate-600 border border-slate-200 font-mono break-all min-w-0">
            ${esc(f.entrypoint)}
          </span>`:''}
      </div>`:''}

      <!-- Attack chain flow -->
      ${flow.length?`
      <div class="mb-4">
        <div class="flex items-center gap-1.5 mb-2.5">
          <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span class="text-xs font-semibold text-slate-700 uppercase tracking-wide">攻击路径</span>
        </div>
        <div class="relative pl-5">
          <div class="absolute left-[7px] top-1 bottom-1 w-0.5 bg-gradient-to-b from-red-300 via-orange-300 to-amber-300 rounded-full"></div>
          ${flow.map((step,i)=>{
            const s = typeof step==='string' ? step : JSON.stringify(step);
            const icon = i===0?'🔓': i===flow.length-1?'💥':'→';
            const nodeColor = i===0?'bg-red-100 border-red-300 text-red-700':
                              i===flow.length-1?'bg-orange-100 border-orange-300 text-orange-700':
                              'bg-slate-50 border-slate-200 text-slate-600';
            return `
            <div class="relative flex items-start gap-2.5 mb-2">
              <div class="absolute -left-[13px] top-1 w-3 h-3 rounded-full border-2 bg-white
                          ${i===0?'border-red-400':i===flow.length-1?'border-orange-400':'border-amber-400'}"></div>
              <div class="flex-1 text-xs leading-relaxed px-3 py-2 rounded-lg border ${nodeColor}">
                <span class="mr-1">${icon}</span>${esc(s)}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}

      <!-- Evidence -->
      ${evidence?`
      <details class="mb-3 group">
        <summary class="flex items-center gap-1.5 text-xs font-medium text-slate-500 cursor-pointer
                       hover:text-blue-600 transition-colors select-none py-1">
          <svg class="w-3.5 h-3.5 transition-transform group-open:rotate-90" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          证据详情
        </summary>
        <div class="mt-2 rounded-lg bg-slate-50 border border-slate-200 p-4">
          ${renderEvidence(evidence)}
        </div>
      </details>`:''}

      <!-- Footer -->
      <div class="flex items-center gap-3 text-xs text-slate-400 pt-2 border-t border-slate-100">
        <div class="flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <code class="font-mono" title="${esc(f.file_path||'')}">${esc(fname)}:${f.start_line||0}</code>
        </div>
        ${f.discovered_by?`<span>发现者: ${esc(f.discovered_by)}</span>`:''}
        ${f.discovery_source?`<span>${esc(f.discovery_source)}</span>`:''}
      </div>

      <!-- Feedback actions -->
      <div class="feedback-actions flex items-center flex-wrap gap-2 mt-3 pt-2 border-t border-slate-100">
        <span class="text-xs text-slate-400">这条结果：</span>
        <button onclick="sendFeedback(${idx},'CONFIRM',this)" class="text-xs px-2 py-1 rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50 transition-colors">确认漏洞</button>
        <button onclick="sendFeedback(${idx},'FALSE_POSITIVE',this)" class="text-xs px-2 py-1 rounded border border-red-200 text-red-600 hover:bg-red-50 transition-colors">误报</button>
        <button onclick="sendFeedback(${idx},'NEEDS_REVIEW',this)" class="text-xs px-2 py-1 rounded border border-amber-200 text-amber-600 hover:bg-amber-50 transition-colors">待复核</button>
      </div>
    </div>`;
}

function renderEvidence(ev) {
  if (Array.isArray(ev)) {
    return ev.map((item, i) => `
      <div class="flex items-start gap-2 mb-2.5 last:mb-0">
        <span class="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 text-xs
                     flex items-center justify-center font-bold mt-0.5">${i + 1}</span>
        <div class="flex-1">${renderEvidenceText(item)}</div>
      </div>`).join('');
  }
  return renderEvidenceText(ev);
}

function renderEvidenceText(ev) {
  const text = typeof ev === 'string' ? ev : JSON.stringify(ev, null, 2);
  const numbered = text.match(/\d+\)\s/);
  if (numbered) {
    const steps = text.split(/(?=\d+\)\s)/).filter(s=>s.trim());
    return steps.map(s => {
      const m = s.match(/^(\d+)\)\s*(.*)/s);
      if (!m) return `<div class="text-xs text-slate-600">${esc(s)}</div>`;
      const body = m[2].trim();
      const codeMatch = body.match(/^(.*?)(:\s*(?:line\s+\d[\d\-,]*:\s*)?)`([^`]+)`(.*)$/s);
      if (codeMatch) {
        return `
          <div class="flex items-start gap-2 mb-2.5 last:mb-0">
            <span class="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 text-xs
                         flex items-center justify-center font-bold mt-0.5">${m[1]}</span>
            <div class="flex-1 text-xs leading-relaxed">
              <span class="text-slate-700">${esc(codeMatch[1]+codeMatch[2])}</span>
              <code class="inline-block mt-1 px-2 py-1 bg-white border border-slate-200
                          rounded text-orange-600 font-mono text-xs break-all">${esc(codeMatch[3])}</code>
              ${codeMatch[4]?`<span class="text-slate-500">${esc(codeMatch[4])}</span>`:''}
            </div>
          </div>`;
      }
      return `
        <div class="flex items-start gap-2 mb-2.5 last:mb-0">
          <span class="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 text-xs
                       flex items-center justify-center font-bold mt-0.5">${m[1]}</span>
          <div class="flex-1 text-xs text-slate-700 leading-relaxed">${esc(body)}</div>
        </div>`;
    }).join('');
  }
  return `<div class="text-xs text-slate-600 leading-relaxed whitespace-pre-wrap">${esc(text)}</div>`;
}

// ── Summary ────────────────────────────────────────────────────────
function renderSummary({ stats={}, tech_profile={}, task_summary={} }) {
  const bySev  = stats.by_severity  || {};
  const byType = stats.by_vuln_type || {};
  const tasks  = task_summary || {};
  const tp     = tech_profile || {};

  document.getElementById('summaryBody').innerHTML = `
    <!-- Severity grid -->
    <div class="grid grid-cols-4 gap-3 mb-6">
      ${[['CRITICAL','text-red-600','bg-red-50 border-red-200'],
         ['HIGH',    'text-orange-600','bg-orange-50 border-orange-200'],
         ['MEDIUM',  'text-amber-600','bg-amber-50 border-amber-200'],
         ['LOW',     'text-blue-600',  'bg-blue-50 border-blue-200']]
        .map(([s,tc,bg])=>`
          <div class="rounded-xl border p-3 ${bg}">
            <div class="text-2xl font-bold ${tc}">${bySev[s]||0}</div>
            <div class="text-xs text-slate-500 mt-0.5">${s}</div>
          </div>`).join('')}
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <!-- Tech stack -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">技术栈</div>
        <div class="space-y-2.5 text-sm">
          ${[['语言',tp.primary_language],['框架',tp.web_framework],
             ['ORM',tp.orm],['构建',tp.build_tool]]
            .filter(([,v])=>v&&v!=='unknown')
            .map(([k,v])=>`
              <div class="flex justify-between">
                <span class="text-slate-400">${k}</span>
                <span class="text-slate-800 font-medium">${esc(v)}</span>
              </div>`).join('')
            ||`<span class="text-slate-400 text-xs">未识别</span>`}
        </div>
      </div>

      <!-- Vuln types -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">漏洞类型</div>
        <div class="space-y-2.5 text-sm">
          ${Object.entries(byType).map(([t,n])=>`
            <div class="flex justify-between">
              <span class="text-slate-500 text-xs">${esc(t)}</span>
              <span class="text-slate-800 font-semibold">${n}</span>
            </div>`).join('')
            ||`<span class="text-slate-400 text-xs">暂无数据</span>`}
        </div>
      </div>
    </div>

    ${tasks.total?`
      <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">
          检测任务 (共 ${tasks.total} 项)
        </div>
        <div class="flex flex-wrap gap-2">
          ${Object.entries(tasks.by_status||{}).map(([s,n])=>`
            <span class="text-xs px-2.5 py-1 rounded-full border ${taskCls(s)}">${s}: ${n}</span>`
          ).join('')}
        </div>
      </div>`:''}
  `;
}

// ── Tabs ───────────────────────────────────────────────────────────
// ── Rule candidates (human gate) ───────────────────────────────────
async function loadRuleCandidates() {
  const el = document.getElementById('rulesBody');
  try {
    const r = await fetch('/audit/rule-candidates');
    if (!r.ok) { el.innerHTML = '<div class="py-12 text-center text-sm text-red-500">加载失败</div>'; return; }
    const data = await r.json();
    renderRuleCandidates(data.candidates || []);
  } catch {
    el.innerHTML = '<div class="py-12 text-center text-sm text-red-500">加载失败</div>';
  }
}

function renderRuleCandidates(candidates) {
  const el = document.getElementById('rulesBody');
  if (!candidates.length) {
    el.innerHTML = `<div class="py-16 text-center">
      <div class="text-sm text-slate-400">暂无规则候选（审计与反馈积累后自动生成）</div></div>`;
    return;
  }
  el.innerHTML = `
    <div class="mb-4 text-sm text-slate-500">共 <strong class="text-slate-800">${candidates.length}</strong> 条规则候选 · 批准后作为更高权重先验注入（仍要求从当前源码复验）</div>
    <div class="space-y-3">${candidates.map(mkRuleCandidate).join('')}</div>`;
}

function mkRuleCandidate(c) {
  const id     = c.candidate_id || '';
  const status = (c.status || 'CANDIDATE').toUpperCase();
  const vtype  = c.vuln_type || '';
  const conf   = c.confidence_score;
  const statusCls = {
    APPROVED:'text-emerald-700 bg-emerald-50 border-emerald-200',
    REJECTED:'text-red-600 bg-red-50 border-red-200',
    DISCARDED:'text-slate-400 bg-slate-50 border-slate-200',
    CANDIDATE:'text-amber-600 bg-amber-50 border-amber-200'
  }[status] || 'text-slate-500 bg-slate-100 border-slate-200';
  const decided = status !== 'CANDIDATE';
  const statusLabel = { APPROVED:'已批准', REJECTED:'已拒绝', DISCARDED:'已废弃' }[status] || status;
  const actionPrefix = decided ? '改为' : '';
  const approveButton = status === 'APPROVED' ? '' : `<button onclick="decideRule('${esc(id)}','APPROVE',this)" class="text-xs px-2.5 py-1 rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50 transition-colors">${actionPrefix}批准</button>`;
  const rejectButton = status === 'REJECTED' ? '' : `<button onclick="decideRule('${esc(id)}','REJECT',this)" class="text-xs px-2.5 py-1 rounded border border-red-200 text-red-600 hover:bg-red-50 transition-colors">${actionPrefix}拒绝</button>`;
  const discardButton = status === 'DISCARDED' ? '' : `<button onclick="decideRule('${esc(id)}','DISCARD',this)" class="text-xs px-2.5 py-1 rounded border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors">${actionPrefix}废弃</button>`;
  return `
    <div class="bg-white border border-slate-200 rounded-xl p-4">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-xs px-2 py-0.5 rounded-full border font-medium ${statusCls}">${esc(status)}</span>
          <span class="text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">${esc(vtype.replace(/_/g,' '))}</span>
          <code class="text-xs text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">${esc(c.rule_id||'')}</code>
        </div>
        <div class="text-xs text-slate-400">置信度 <span class="font-medium text-slate-600">${conf==null?'-':esc(String(conf))}</span></div>
      </div>
      <div class="text-xs text-slate-500 mb-3 flex flex-wrap gap-x-4 gap-y-1">
        <span>文件: <code class="font-mono">${esc(c.file_pattern||'-')}</code></span>
        ${c.http_path?`<span>路径: <code class="font-mono">${esc(c.http_path)}</code></span>`:''}
        <span>观察 ${c.observed_finding_count??0} · 确认 ${c.confirm_count??0} · 误报 ${c.false_positive_count??0}</span>
      </div>
      <div class="rule-actions flex items-center flex-wrap gap-2">
        ${decided ? `<span class="text-xs text-slate-500 mr-1">当前：${esc(statusLabel)}</span>` : ''}
        ${approveButton}
        ${rejectButton}
        ${discardButton}
      </div>
    </div>`;
}

async function decideRule(id, decision, btn) {
  const wrap = btn.closest('.rule-actions');
  try {
    const r = await fetch(`/audit/rule-candidates/${encodeURIComponent(id)}/decision`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decision, reviewer: 'ui' })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const label = { APPROVED:'已批准（将作为先验回流）', REJECTED:'已拒绝', DISCARDED:'已废弃' }[data.status] || data.status;
    if (wrap) wrap.innerHTML = `<span class="text-xs text-emerald-600 font-medium">${label}</span>`;
  } catch (e) {
    if (wrap) wrap.insertAdjacentHTML('beforeend', `<span class="text-xs text-red-500 ml-1">操作失败，请重试</span>`);
  }
}

function showTab(name) {
  ['Logs','Findings','Summary','Rules'].forEach(t => {
    document.getElementById(`panel${t}`).classList.toggle('hidden', t!==name);
    document.getElementById(`tab${t}`).classList.toggle('on', t===name);
  });
  if (name === 'Rules') loadRuleCandidates();
}

// ── Badge helpers ──────────────────────────────────────────────────
function mkBadge(status, lg=false) {
  const m = {
    pending:     ['⏳','text-slate-500 bg-slate-100'],
    cloning:     ['⬇','text-blue-600 bg-blue-50'],
    running:     ['▶','text-emerald-600 bg-emerald-50'],
    done:        ['✓','text-emerald-600 bg-emerald-50'],
    failed:      ['✗','text-red-600 bg-red-50'],
  };
  const [icon,cls] = m[status]||['?','text-slate-500 bg-slate-100'];
  const anim = ['running','cloning'].includes(status)?' pulse':'';
  const px   = lg ? 'px-2 py-0.5 text-xs' : 'px-1.5 py-0.5 text-xs';
  return `<span class="inline-flex items-center gap-1 rounded-full font-medium ${px} ${cls}${anim}">${icon} ${status}</span>`;
}

function mkSev(s) {
  const m = {
    CRITICAL: 'sev-critical',
    HIGH:     'sev-high',
    MEDIUM:   'sev-medium',
    LOW:      'sev-low',
  };
  return `<span class="px-2 py-0.5 text-xs font-bold rounded border ${m[s]||'bg-slate-100 text-slate-500 border-slate-200'}">${s}</span>`;
}

function taskCls(s) {
  return {
    done:    'border-emerald-200 bg-emerald-50 text-emerald-600',
    failed:  'border-red-200 bg-red-50 text-red-600',
    running: 'border-blue-200 bg-blue-50 text-blue-600',
    pending: 'border-slate-200 bg-slate-50 text-slate-500',
    skipped: 'border-slate-200 bg-slate-50 text-slate-400',
  }[s]||'border-slate-200 text-slate-500';
}

// ── Utilities ──────────────────────────────────────────────────────
function ago(iso) {
  if (!iso) return '';
  const d = new Date(iso.endsWith('Z')||iso.includes('+') ? iso : iso+'Z');
  const s = Math.round((Date.now()-d)/1000);
  if (s<5)    return '刚刚';
  if (s<60)   return `${s}s 前`;
  if (s<3600) return `${Math.floor(s/60)}m 前`;
  if (s<86400)return `${Math.floor(s/3600)}h 前`;
  return d.toLocaleDateString('zh-CN');
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
