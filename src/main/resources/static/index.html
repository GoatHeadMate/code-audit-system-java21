<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Audit System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; }

  /* Thin scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

  /* Animations */
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  .pulse { animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .8s linear infinite; }

  /* Log text */
  .log-line {
    font-family: 'Consolas','Monaco','Menlo',monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Job list rows */
  .job-row { cursor: pointer; transition: background .1s; border-left: 2px solid transparent; }
  .job-row:hover { background: rgba(55,65,81,.4); }
  .job-row.sel { background: rgba(59,130,246,.1); border-left-color: #3b82f6; }

  /* Tab button */
  .tab { padding: .5rem 1rem; font-size: .8125rem; color: #6b7280;
         border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; white-space: nowrap; }
  .tab:hover { color: #d1d5db; }
  .tab.on { color: #60a5fa; border-bottom-color: #3b82f6; font-weight: 500; }

  /* Toggle button */
  .tog { flex: 1; padding: .375rem .5rem; border-radius: .375rem; font-size: .75rem;
         font-weight: 500; transition: all .15s; text-align: center; }
  .tog.on  { background: #2563eb; color: #fff; }
  .tog.off { color: #9ca3af; }
  .tog.off:hover { color: #e5e7eb; }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden text-gray-100" style="background:#030712">

<!-- ═══════ HEADER ═══════════════════════════════════════════════════ -->
<header class="shrink-0 flex items-center justify-between px-5 py-3 bg-gray-900 border-b border-gray-800 z-10">
  <div class="flex items-center gap-2.5">
    <svg class="w-5 h-5 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
    </svg>
    <span class="font-semibold">Code Audit System</span>
    <span class="hidden sm:block text-xs text-gray-600">CodeQL + LLM</span>
  </div>
  <div id="health" class="flex items-center gap-1.5 text-xs text-gray-500">
    <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span><span>连接中…</span>
  </div>
</header>

<!-- ═══════ BODY ═══════════════════════════════════════════════════ -->
<div class="flex flex-1 overflow-hidden">

  <!-- ─── SIDEBAR ────────────────────────────────────────────────── -->
  <aside class="w-64 shrink-0 flex flex-col overflow-hidden bg-gray-900 border-r border-gray-800">

    <!-- Submit -->
    <div class="shrink-0 p-4 border-b border-gray-800">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">新建审计</p>

      <!-- Source toggle -->
      <div class="flex bg-gray-800 rounded-lg p-0.5 mb-3 gap-0.5">
        <button id="tGit" class="tog on" onclick="setMode('git')">Git URL</button>
        <button id="tZip" class="tog off" onclick="setMode('zip')">ZIP 上传</button>
      </div>

      <div id="fGit">
        <input id="gitUrl" type="url" placeholder="https://github.com/…"
          class="w-full bg-gray-800 border border-gray-700 text-sm text-gray-200
                 placeholder-gray-600 rounded-lg px-3 py-2
                 focus:outline-none focus:border-blue-500 transition-colors" />
      </div>

      <div id="fZip" class="hidden">
        <label class="flex flex-col items-center justify-center w-full h-14 border-2 border-dashed
                      border-gray-700 rounded-lg cursor-pointer hover:border-gray-500 transition-colors">
          <span id="zipName" class="text-xs text-gray-600">📁 点击选择 ZIP 文件</span>
          <input id="zipFile" type="file" accept=".zip" class="hidden" onchange="onZip(this)">
        </label>
      </div>

      <button id="submitBtn" onclick="doSubmit()"
        class="mt-3 w-full flex items-center justify-center gap-2 py-2 bg-blue-600 hover:bg-blue-500
               text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-50">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        开始审计
      </button>
      <div id="submitErr" class="hidden mt-1.5 text-xs text-red-400 text-center"></div>
    </div>

    <!-- Job list -->
    <div class="shrink-0 flex items-center justify-between px-4 py-2">
      <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">任务列表</span>
      <button onclick="loadJobs()" title="刷新"
        class="text-gray-600 hover:text-gray-400 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>

    <div id="jobList" class="flex-1 overflow-y-auto">
      <div class="py-10 text-center text-xs text-gray-700">暂无任务</div>
    </div>
  </aside>

  <!-- ─── MAIN ──────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Empty state -->
    <div id="emptyMain"
      class="flex-1 flex flex-col items-center justify-center gap-3 text-gray-700 select-none">
      <svg class="w-14 h-14 opacity-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      <p class="text-sm opacity-40">选择左侧任务查看详情</p>
    </div>

    <!-- Detail view -->
    <div id="detailView" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- Detail header -->
      <div class="shrink-0 flex items-center gap-3 px-5 py-3 bg-gray-900/50 border-b border-gray-800">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <code id="dId" class="text-sm font-mono text-blue-400"></code>
            <span id="dBadge"></span>
          </div>
          <div id="dSrc" class="text-xs text-gray-500 truncate"></div>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <span id="dCount" class="hidden text-xs px-2 py-0.5 rounded-full border
                                    bg-orange-900/30 text-orange-400 border-orange-900/50"></span>
          <span id="dTime" class="text-xs text-gray-600"></span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="shrink-0 flex border-b border-gray-800 bg-gray-900/20 px-4 gap-0.5">
        <button id="tabLogs"     class="tab on"  onclick="showTab('Logs')">实时日志</button>
        <button id="tabFindings" class="tab"     onclick="showTab('Findings')">漏洞发现</button>
        <button id="tabSummary"  class="tab"     onclick="showTab('Summary')">摘要</button>
      </div>

      <!-- Log panel -->
      <div id="panelLogs"
        class="flex-1 overflow-y-auto p-4 space-y-px"
        style="background:#030712"
        onscroll="onScroll(this)">
        <div id="logEnd"></div><!-- anchor always at bottom -->
      </div>

      <!-- Findings panel -->
      <div id="panelFindings" class="hidden flex-1 overflow-y-auto p-4">
        <div id="findingsBody" class="text-sm text-gray-600 text-center py-12">等待审计完成…</div>
      </div>

      <!-- Summary panel -->
      <div id="panelSummary" class="hidden flex-1 overflow-y-auto p-5">
        <div id="summaryBody" class="text-sm text-gray-600 text-center py-12">等待审计完成…</div>
      </div>
    </div>
  </main>
</div>

<!-- ═══════ SCRIPT ═══════════════════════════════════════════════════ -->
<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────
let selId    = null;       // selected job_id
let srcMode  = 'git';      // 'git' | 'zip'
let es       = null;       // EventSource
let autoScrl = true;       // auto-scroll log
let jobs     = {};         // id → dto cache

// ── Boot ───────────────────────────────────────────────────────────
ping();
loadJobs();
setInterval(ping, 10000);
setInterval(loadJobs, 3000);

// ── Health ─────────────────────────────────────────────────────────
async function ping() {
  const el = document.getElementById('health');
  try {
    const ok = (await fetch('/health')).ok;
    el.innerHTML = ok
      ? `<span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse"></span><span class="text-green-400">在线</span>`
      : `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span class="text-red-400">错误</span>`;
  } catch {
    el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span class="text-red-400">离线</span>`;
  }
}

// ── Source mode toggle ─────────────────────────────────────────────
function setMode(m) {
  srcMode = m;
  document.getElementById('tGit').className  = 'tog ' + (m==='git' ? 'on' : 'off');
  document.getElementById('tZip').className  = 'tog ' + (m==='zip' ? 'on' : 'off');
  document.getElementById('fGit').classList.toggle('hidden', m !== 'git');
  document.getElementById('fZip').classList.toggle('hidden', m !== 'zip');
}
function onZip(inp) {
  document.getElementById('zipName').textContent =
    inp.files[0] ? `📁 ${inp.files[0].name}` : '📁 点击选择 ZIP 文件';
}

// ── Submit ─────────────────────────────────────────────────────────
async function doSubmit() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('submitErr');
  err.classList.add('hidden');

  const fd = new FormData();
  fd.append('lang', 'java');

  if (srcMode === 'git') {
    const u = document.getElementById('gitUrl').value.trim();
    if (!u) return showErr('请输入 Git URL');
    fd.append('git_url', u);
  } else {
    const f = document.getElementById('zipFile').files[0];
    if (!f) return showErr('请选择 ZIP 文件');
    fd.append('file', f);
  }

  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 spin" fill="none" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
    <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg> 提交中…`;

  try {
    const r   = await fetch('/audit', { method:'POST', body:fd });
    const raw = await r.text();
    let res = {};
    try {
      res = raw ? JSON.parse(raw) : {};
    } catch {
      const preview = raw.replace(/\s+/g, ' ').slice(0, 160);
      throw new Error(
        `服务器返回了非 JSON 响应（HTTP ${r.status}）。` +
        `请确认页面是通过 Java 服务地址打开，而不是直接打开 HTML 文件。` +
        (preview ? ` 响应：${preview}` : '')
      );
    }
    if (!r.ok) throw new Error(res.detail || `提交失败（HTTP ${r.status}）`);

    document.getElementById('gitUrl').value  = '';
    document.getElementById('zipFile').value = '';
    document.getElementById('zipName').textContent = '📁 点击选择 ZIP 文件';
    await loadJobs();
    select(res.job_id);
  } catch(e) {
    showErr(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg> 开始审计`;
  }
}
function showErr(msg) {
  const el = document.getElementById('submitErr');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── Job list ───────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const { jobs: list } = await (await fetch('/audit')).json();
    jobs = {};
    list.forEach(j => jobs[j.job_id] = j);
    renderList(list);
    if (selId && jobs[selId]) {
      updateHeader(jobs[selId]);
      if (jobs[selId].status === 'done') loadFindings(selId);
    }
  } catch { /* retry next tick */ }
}

function renderList(list) {
  const el = document.getElementById('jobList');
  if (!list.length) {
    el.innerHTML = `<div class="py-10 text-center text-xs text-gray-700">暂无任务</div>`;
    return;
  }
  el.innerHTML = list.map(j => `
    <div class="job-row px-4 py-3 ${j.job_id===selId?'sel':''}" onclick="select('${j.job_id}')">
      <div class="flex items-center justify-between gap-1 mb-0.5">
        <code class="text-xs font-mono text-blue-400">#${j.job_id}</code>
        ${mkBadge(j.status)}
      </div>
      <div class="text-xs text-gray-600 truncate">
        ${j.source_type==='git'
          ? `<span class="text-gray-700">git</span> ${esc(j.git_url||'')}`
          : '📦 zip'}
      </div>
      ${j.findings_count>0
        ? `<div class="text-xs text-orange-400 mt-0.5">${j.findings_count} findings</div>`
        : ''}
      <div class="text-xs text-gray-700 mt-0.5">${ago(j.created_at)}</div>
    </div>`).join('');
}

// ── Job selection ──────────────────────────────────────────────────
function select(id) {
  stopES();
  selId     = id;
  autoScrl  = true;

  document.getElementById('emptyMain').classList.add('hidden');
  const dv = document.getElementById('detailView');
  dv.classList.remove('hidden');
  dv.classList.add('flex');

  // clear log panel (keep #logEnd anchor)
  const lp = document.getElementById('panelLogs');
  const anchor = document.getElementById('logEnd');
  while (lp.firstChild !== anchor) lp.removeChild(lp.firstChild);

  document.getElementById('findingsBody').innerHTML =
    `<div class="text-sm text-gray-600 text-center py-12">等待审计完成…</div>`;
  document.getElementById('summaryBody').innerHTML  =
    `<div class="text-sm text-gray-600 text-center py-12">等待审计完成…</div>`;

  renderList(Object.values(jobs));
  showTab('Logs');

  const j = jobs[id];
  if (j) {
    updateHeader(j);
    if (j.status === 'done')   loadFindings(id);
    if (j.status === 'failed' && j.error) addLog(`[FATAL] ${j.error}`, 'err');
  }
  startES(id);
}

function updateHeader(j) {
  document.getElementById('dId').textContent    = `#${j.job_id}`;
  document.getElementById('dBadge').innerHTML   = mkBadge(j.status, true);
  document.getElementById('dSrc').textContent   =
    j.source_type==='git' ? `git · ${j.git_url||''}` : `zip · ${j.lang}`;
  document.getElementById('dTime').textContent  = ago(j.updated_at);
  const fc = document.getElementById('dCount');
  if (j.findings_count > 0) {
    fc.textContent = `${j.findings_count} findings`;
    fc.classList.remove('hidden');
  } else fc.classList.add('hidden');
}

// ── Log streaming ──────────────────────────────────────────────────
function startES(id) {
  const src = new EventSource(`/audit/${id}/logs`);
  es = src;
  src.onmessage = e => {
    if (e.data === '[DONE]') {
      src.close(); es = null;
      addLog('─── 日志结束 ───', 'dim');
      loadJobs();
      return;
    }
    addLog(e.data);
  };
  src.onerror = () => { if (src.readyState !== EventSource.CLOSED) { src.close(); es = null; } };
}
function stopES() { if (es) { es.close(); es = null; } }

function addLog(text, type = '') {
  const lp     = document.getElementById('panelLogs');
  const anchor = document.getElementById('logEnd');
  const d      = document.createElement('div');
  d.className  = 'log-line ' + logColor(text, type);
  d.innerHTML  = colorize(text, type);
  lp.insertBefore(d, anchor);
  if (autoScrl) lp.scrollTop = lp.scrollHeight;
}

function logColor(t, type) {
  if (type==='err') return 'text-red-400';
  if (type==='dim') return 'text-gray-700 text-center text-xs py-1';
  return 'text-gray-300';
}
function colorize(t, type) {
  if (type==='err'||type==='dim') return esc(t);
  if (t.startsWith('[codeql]'))
    return `<span class="text-cyan-400">[codeql]</span>${esc(t.slice(8))}`;
  if (t.startsWith('[orchestrator]'))
    return `<span class="text-purple-400">[orchestrator]</span>${esc(t.slice(14))}`;
  const m = t.match(/^(\[[^\]]+\])([\s\S]*)/);
  if (m) return `<span class="text-green-400">${esc(m[1])}</span>${esc(m[2])}`;
  if (/FATAL|ERROR/.test(t)) return `<span class="text-red-400">${esc(t)}</span>`;
  if (/WARN/.test(t))        return `<span class="text-yellow-400">${esc(t)}</span>`;
  if (t.includes('done:'))   return `<span class="text-emerald-400">${esc(t)}</span>`;
  return esc(t);
}
function onScroll(el) {
  autoScrl = el.scrollTop + el.clientHeight >= el.scrollHeight - 80;
}

// ── Findings ───────────────────────────────────────────────────────
async function loadFindings(id) {
  try {
    const r = await fetch(`/audit/${id}/findings`);
    if (!r.ok) return;
    const data = await r.json();
    renderFindings(data);
    renderSummary(data);
  } catch { /* ignore */ }
}

function renderFindings({ findings=[] }) {
  const el = document.getElementById('findingsBody');
  if (!findings.length) {
    el.innerHTML = `<div class="py-16 text-center">
      <div class="text-4xl mb-3">🎉</div>
      <div class="text-sm text-gray-500">未发现漏洞</div>
    </div>`;
    return;
  }
  el.innerHTML = `
    <div class="mb-4 text-sm text-gray-400">
      共 <strong class="text-white">${findings.length}</strong> 个漏洞
    </div>
    <div class="space-y-3">${findings.map(mkFinding).join('')}</div>`;
}

function mkFinding(f) {
  const sev   = (f.severity||'UNKNOWN').toUpperCase();
  const conf  = Math.round((f.confidence||0)*100);
  const fname = (f.file_path||'').replace(/\\/g,'/').split('/').pop();
  const flow  = f.data_flow_path||[];
  return `
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-gray-700 transition-colors">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex items-center gap-2 flex-wrap">
          ${mkSev(sev)}
          <code class="text-xs text-blue-400 bg-blue-950/50 px-1.5 py-0.5 rounded">${esc(f.rule_id||'')}</code>
        </div>
        <span class="text-xs text-gray-600 shrink-0">${conf}% 置信度</span>
      </div>
      <p class="text-sm text-gray-200 leading-relaxed mb-3">${esc(f.message||'')}</p>
      <div class="flex items-center gap-3 text-xs text-gray-500">
        <div class="flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <code class="font-mono" title="${esc(f.file_path||'')}">${esc(fname)}:${f.start_line||0}</code>
        </div>
        ${f.discovered_by?`<span class="text-gray-700">by ${esc(f.discovered_by)}</span>`:''}
      </div>
      ${flow.length?`
        <details class="mt-3">
          <summary class="text-xs text-gray-600 cursor-pointer hover:text-gray-400 transition-colors select-none">
            数据流路径 (${flow.length} 步)
          </summary>
          <div class="mt-1.5 pl-2 border-l border-gray-800 space-y-0.5">
            ${flow.slice(0,6).map((n,i)=>`
              <div class="text-xs font-mono text-gray-600">
                <span class="text-gray-700">${i+1}.</span> ${esc(JSON.stringify(n).slice(0,100))}
              </div>`).join('')}
            ${flow.length>6?`<div class="text-xs text-gray-700">… +${flow.length-6} more</div>`:''}
          </div>
        </details>`:''}
    </div>`;
}

// ── Summary ────────────────────────────────────────────────────────
function renderSummary({ stats={}, tech_profile={}, task_summary={} }) {
  const bySev  = stats.by_severity  || {};
  const byType = stats.by_vuln_type || {};
  const tasks  = task_summary || {};
  const tp     = tech_profile || {};

  document.getElementById('summaryBody').innerHTML = `
    <!-- Severity grid -->
    <div class="grid grid-cols-4 gap-3 mb-6">
      ${[['CRITICAL','text-red-400','bg-red-900/20 border-red-900/40'],
         ['HIGH',    'text-orange-400','bg-orange-900/20 border-orange-900/40'],
         ['MEDIUM',  'text-yellow-400','bg-yellow-900/20 border-yellow-900/40'],
         ['LOW',     'text-blue-400',  'bg-blue-900/20 border-blue-900/40']]
        .map(([s,tc,bg])=>`
          <div class="rounded-xl border p-3 ${bg}">
            <div class="text-2xl font-bold ${tc}">${bySev[s]||0}</div>
            <div class="text-xs text-gray-500 mt-0.5">${s}</div>
          </div>`).join('')}
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <!-- Tech stack -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">技术栈</div>
        <div class="space-y-2 text-sm">
          ${[['语言',tp.primary_language],['框架',tp.web_framework],
             ['ORM',tp.orm],['构建',tp.build_tool]]
            .filter(([,v])=>v&&v!=='unknown')
            .map(([k,v])=>`
              <div class="flex justify-between">
                <span class="text-gray-600">${k}</span>
                <span class="text-gray-200">${esc(v)}</span>
              </div>`).join('')
            ||`<span class="text-gray-700 text-xs">未识别</span>`}
        </div>
      </div>

      <!-- Vuln types -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">漏洞类型</div>
        <div class="space-y-2 text-sm">
          ${Object.entries(byType).map(([t,n])=>`
            <div class="flex justify-between">
              <span class="text-gray-500 text-xs">${esc(t)}</span>
              <span class="text-white font-medium">${n}</span>
            </div>`).join('')
            ||`<span class="text-gray-700 text-xs">暂无数据</span>`}
        </div>
      </div>
    </div>

    ${tasks.total?`
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
          检测任务 (共 ${tasks.total} 项)
        </div>
        <div class="flex flex-wrap gap-2">
          ${Object.entries(tasks.by_status||{}).map(([s,n])=>`
            <span class="text-xs px-2.5 py-1 rounded-full border ${taskCls(s)}">${s}: ${n}</span>`
          ).join('')}
        </div>
      </div>`:''}
  `;
}

// ── Tabs ───────────────────────────────────────────────────────────
function showTab(name) {
  ['Logs','Findings','Summary'].forEach(t => {
    document.getElementById(`panel${t}`).classList.toggle('hidden', t!==name);
    document.getElementById(`tab${t}`).classList.toggle('on', t===name);
  });
}

// ── Badge helpers ──────────────────────────────────────────────────
function mkBadge(status, lg=false) {
  const m = {
    pending:     ['⏳','text-gray-400 bg-gray-800/80'],
    cloning:     ['⬇','text-blue-400 bg-blue-900/40'],
    building_db: ['🔨','text-yellow-400 bg-yellow-900/40'],
    running:     ['▶','text-green-400 bg-green-900/40'],
    done:        ['✓','text-emerald-400 bg-emerald-900/40'],
    failed:      ['✗','text-red-400 bg-red-900/40'],
  };
  const [icon,cls] = m[status]||['?','text-gray-500 bg-gray-800'];
  const anim = ['running','cloning','building_db'].includes(status)?' pulse':'';
  const px   = lg ? 'px-2 py-0.5 text-xs' : 'px-1.5 py-0.5 text-xs';
  return `<span class="inline-flex items-center gap-1 rounded-full font-medium ${px} ${cls}${anim}">${icon} ${status}</span>`;
}

function mkSev(s) {
  const m = {
    CRITICAL: 'bg-red-900/50 text-red-300 border-red-800',
    HIGH:     'bg-orange-900/50 text-orange-300 border-orange-800',
    MEDIUM:   'bg-yellow-900/50 text-yellow-300 border-yellow-800',
    LOW:      'bg-blue-900/50 text-blue-300 border-blue-800',
  };
  return `<span class="px-2 py-0.5 text-xs font-bold rounded border ${m[s]||'bg-gray-800 text-gray-400 border-gray-700'}">${s}</span>`;
}

function taskCls(s) {
  return {
    done:    'border-emerald-900 text-emerald-400',
    failed:  'border-red-900 text-red-400',
    running: 'border-blue-900 text-blue-400',
    pending: 'border-gray-700 text-gray-500',
    skipped: 'border-gray-800 text-gray-600',
  }[s]||'border-gray-700 text-gray-500';
}

// ── Utilities ──────────────────────────────────────────────────────
function ago(iso) {
  if (!iso) return '';
  const d = new Date(iso.endsWith('Z')||iso.includes('+') ? iso : iso+'Z');
  const s = Math.round((Date.now()-d)/1000);
  if (s<5)    return '刚刚';
  if (s<60)   return `${s}s 前`;
  if (s<3600) return `${Math.floor(s/60)}m 前`;
  if (s<86400)return `${Math.floor(s/3600)}h 前`;
  return d.toLocaleDateString('zh-CN');
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
